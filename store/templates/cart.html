<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f1f3f6;
        }

        /* Navbar */
        .navbar {
            background: #2874f0;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        /* Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        /* back to shop  */
        .btn-back {
    display: inline-block;
    padding: 10px 15px;
    background: #2874f0;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.btn-back:hover {
    background: #5f636a;
}

        /* Card */
        .card {
           
            background: white;
            padding: 9px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

      .card img {
    display: block;
    margin: 0 auto;          /* ✅ center horizontally */
    
    max-width: 100%;         /* responsive */
    height: 180px;

    object-fit: contain;     /* ✅ show full image centered */
}

        .price {
            font-weight: bold;
            margin: 5px 0;
        }

        .qty {
            color: gray;
        }

        /* Buttons */
        .btn {
            display: block;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }

        .remove-btn {
            background: red;
        }

        .remove-btn:hover {
            background: darkred;
        }

        .buy-btn {
            background: orange;
        }

        .buy-btn:hover {
            background: darkorange;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>My Cart 🛒</h2>
    <a href="/" class="btn-back">Back to shop</a>
</div>

<!-- Cart Items -->
<div class="container">
    {% for item in items %}
        <div class="card">

            {% if item.product.image %}
                <img src="{{ item.product.image.url }}">
            {% endif %}

            <h3>{{ item.product.name }}</h3>

            <p class="price">₹{{ item.product.price }}</p>
           

        <a href="{% url 'buy_now' item.product.id %}" class="btn buy-btn">
    Buy Now
</a>

            <a href="{% url 'remove_from_cart' item.id %}" class="btn remove-btn">
                Remove
            </a>
        </div>

    {% empty %}
        <p class="empty">Your cart is empty 😢</p>
    {% endfor %}
</div>

</body>
</html>
